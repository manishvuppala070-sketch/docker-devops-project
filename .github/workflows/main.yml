name: My First CI Pipeline

on:
  push:
     branches:
         -main

jobs:
   run-my-app:
	runs-on: ubuntu-latest

	steps:
	  -name: checkout code
  	   uses: actions/checkout@v3

	  -name: set up python
	   uses: actions/setup-python@v4
           with:
	     python-version:'3.10'

	  -name: run app.py
	   run: python app.py